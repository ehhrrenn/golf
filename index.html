<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron's Pro Yardage Guide</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 10px 0;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: 20px auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #35424a;
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>Aaron's Pro Yardage Guide</h1>
    </header>
    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Club</th>
                    <th>Yardage</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Driver</td>
                    <td>250</td>
                </tr>
                <tr>
                    <td>3 Wood</td>
                    <td>240</td>
                </tr>
                <tr>
                    <td>5 Wood</td>
                    <td>220</td>
                </tr>
                <tr>
                    <td>Iron 3</td>
                    <td>210</td>
                </tr>
                <tr>
                    <td>Iron 4</td>
                    <td>200</td>
                </tr>
                <tr>
                    <td>Iron 5</td>
                    <td>190</td>
                </tr>
                <tr>
                    <td>Iron 6</td>
                    <td>180</td>
                </tr>
                <tr>
                    <td>Iron 7</td>
                    <td>170</td>
                </tr>
                <tr>
                    <td>Iron 8</td>
                    <td>160</td>
                </tr>
                <tr>
                    <td>Iron 9</td>
                    <td>150</td>
                </tr>
                <tr>
                    <td>Pitching Wedge</td>
                    <td>140</td>
                </tr>
                <tr>
                    <td>Sand Wedge</td>
                    <td>100</td>
                </tr>
            </tbody>
        </table>
        <script>
            // Interactivity example: Alert club yardage when clicked
            document.querySelectorAll('tr').forEach(row => {
                row.addEventListener('click', () => {
                    let club = row.cells[0].innerText;
                    let yardage = row.cells[1].innerText;
                    alert(`The ${club} hits ${yardage} yards.`);
                });
            });
        </script>
    </div>
</body>
</html>
